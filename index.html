<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>InstaSquare - Instagram用 画像加工ツール</title>
    <meta name="description" content="1:1 / 9:16 対応。位置調整・ズーム・回転・反転・フィルターを備えた、Instagram投稿に最適な写真加工ツール。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#grad)" stroke-width="2" />
                        <circle cx="12" cy="12" r="5" stroke="url(#grad)" stroke-width="2" />
                        <circle cx="18" cy="6" r="1.5" fill="url(#grad)" />
                        <defs>
                            <linearGradient id="grad" x1="0" y1="0" x2="24" y2="24">
                                <stop offset="0%" stop-color="#f09433" />
                                <stop offset="25%" stop-color="#e6683c" />
                                <stop offset="50%" stop-color="#dc2743" />
                                <stop offset="75%" stop-color="#cc2366" />
                                <stop offset="100%" stop-color="#bc1888" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>InstaSquare</h1>
            </div>
            <p class="tagline">1:1 / 9:16 対応・位置調整・ズーム・回転・フィルター</p>
        </header>

        <!-- Aspect ratio tabs -->
        <div class="aspect-tabs" id="aspectTabs">
            <button class="aspect-tab active" data-aspect="1:1">
                <span class="aspect-icon"><span class="aspect-box aspect-1-1"></span></span>
                <span>1:1 フィード</span>
            </button>
            <button class="aspect-tab" data-aspect="9:16">
                <span class="aspect-icon"><span class="aspect-box aspect-9-16"></span></span>
                <span>9:16 ストーリーズ/リール</span>
            </button>
        </div>

        <!-- Upload Area -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M32 8L32 40" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" />
                            <path d="M20 20L32 8L44 20" stroke="url(#uploadGrad)" stroke-width="3"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M8 44V48C8 52.4183 11.5817 56 16 56H48C52.4183 56 56 52.4183 56 48V44"
                                stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" />
                            <defs>
                                <linearGradient id="uploadGrad" x1="8" y1="8" x2="56" y2="56">
                                    <stop offset="0%" stop-color="#f09433" />
                                    <stop offset="50%" stop-color="#dc2743" />
                                    <stop offset="100%" stop-color="#bc1888" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2>タップして写真を選択</h2>
                    <p>最大<strong>20枚</strong>まで同時アップロード</p>
                    <p class="upload-formats">JPG / PNG / WebP</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp"
                    style="display:none">
            </div>
            <div class="upload-count" id="uploadCount" style="display:none">
                <span id="countText">0 / 20 枚アップロード済み</span>
            </div>
        </div>

        <!-- Editor Section -->
        <div class="editor-section" id="editorSection" style="display:none">
            <!-- Thumbnail strip -->
            <div class="thumb-strip-wrap">
                <div class="thumb-strip" id="thumbStrip"></div>
                <button class="btn btn-secondary btn-sm" id="addMoreBtnTop">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                        <path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" />
                    </svg>
                    追加
                </button>
            </div>

            <!-- Editor main -->
            <div class="editor-main">
                <div class="editor-preview-wrap">
                    <div class="editor-preview" id="editorPreview">
                        <canvas id="previewCanvas"></canvas>
                        <div class="crop-grid" id="cropGrid"></div>
                        <div class="before-badge" id="beforeBadge" style="display:none">元画像</div>
                    </div>
                    <div class="preview-meta" id="previewMeta"></div>
                </div>

                <div class="editor-controls">
                    <div class="control-row">
                        <label class="control-row-label">
                            <span>ズーム</span>
                            <span class="control-value" id="zoomValue">1.0x</span>
                        </label>
                        <input type="range" id="zoomRange" min="100" max="400" step="1" value="100" class="slider">
                    </div>

                    <div class="control-buttons">
                        <button class="icon-btn" id="rotateBtn" title="90°回転">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            <span>90°回転</span>
                        </button>
                        <button class="icon-btn" id="flipBtn" title="左右反転">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <polyline points="17 1 21 5 17 9"></polyline>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                                <polyline points="7 23 3 19 7 15"></polyline>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                            </svg>
                            <span>左右反転</span>
                        </button>
                        <button class="icon-btn" id="autoBtn" title="自動推定">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <circle cx="12" cy="12" r="4"></circle>
                                <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                            </svg>
                            <span>自動配置</span>
                        </button>
                        <button class="icon-btn" id="resetBtn" title="リセット">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                            </svg>
                            <span>リセット</span>
                        </button>
                        <button class="icon-btn icon-btn-toggle" id="beforeToggleBtn" title="Before/After">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
                            </svg>
                            <span>Before/After</span>
                        </button>
                        <button class="icon-btn icon-btn-danger" id="removeOneBtn" title="この画像を削除">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path>
                                <path d="M10 11v6M14 11v6"></path>
                                <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            <span>削除</span>
                        </button>
                    </div>

                    <p class="hint">プレビュー上をドラッグで位置調整 / ピンチまたはホイールでズーム</p>
                </div>
            </div>

            <!-- Global filter controls -->
            <details class="global-controls">
                <summary>
                    <span>全画像に適用するフィルター</span>
                    <span class="summary-chevron">▾</span>
                </summary>

                <div class="preset-row">
                    <button class="preset-btn active" data-preset="none">なし</button>
                    <button class="preset-btn" data-preset="vivid">映える</button>
                    <button class="preset-btn" data-preset="mute">シック</button>
                    <button class="preset-btn" data-preset="film">フィルム</button>
                    <button class="preset-btn" data-preset="mono">モノクロ</button>
                    <button class="preset-btn" data-preset="warm">暖色</button>
                    <button class="preset-btn" data-preset="cool">寒色</button>
                </div>

                <div class="controls-section">
                    <div class="control-card">
                        <label for="blurRange">
                            <span class="control-label-text">ぼかし強度</span>
                            <span class="control-value" id="blurValue">0px</span>
                        </label>
                        <input type="range" id="blurRange" min="0" max="100" step="1" value="0" class="slider">
                        <div class="slider-labels">
                            <span>なし</span>
                            <span>強い</span>
                        </div>
                    </div>
                    <div class="control-card">
                        <label for="brightnessRange">
                            <span class="control-label-text">明るさ</span>
                            <span class="control-value" id="brightnessValue">±0</span>
                        </label>
                        <input type="range" id="brightnessRange" min="-100" max="100" step="1" value="0" class="slider">
                        <div class="slider-labels">
                            <span>暗い</span>
                            <span>明るい</span>
                        </div>
                    </div>
                    <div class="control-card">
                        <label for="contrastRange">
                            <span class="control-label-text">コントラスト</span>
                            <span class="control-value" id="contrastValue">±0</span>
                        </label>
                        <input type="range" id="contrastRange" min="-100" max="100" step="1" value="0" class="slider">
                        <div class="slider-labels">
                            <span>低い</span>
                            <span>高い</span>
                        </div>
                    </div>
                    <div class="control-card">
                        <label for="saturationRange">
                            <span class="control-label-text">彩度</span>
                            <span class="control-value" id="saturationValue">±0</span>
                        </label>
                        <input type="range" id="saturationRange" min="-100" max="100" step="1" value="0" class="slider">
                        <div class="slider-labels">
                            <span>淡い</span>
                            <span>鮮やか</span>
                        </div>
                    </div>
                </div>
            </details>

            <!-- Output options -->
            <div class="output-options">
                <div class="filename-input-wrap">
                    <label for="filenamePrefix">ファイル名プレフィックス（連番付き）</label>
                    <input type="text" id="filenamePrefix" placeholder="例: insta_post" maxlength="60">
                </div>
                <div class="output-actions">
                    <button class="btn btn-secondary" id="downloadSingleBtn">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                            <path fill-rule="evenodd"
                                d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                        この1枚をダウンロード
                    </button>
                    <button class="btn btn-primary" id="downloadAllBtn">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                            <path fill-rule="evenodd"
                                d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                        すべてダウンロード (ZIP)
                    </button>
                    <button class="btn btn-danger" id="clearAllBtn">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                            <path fill-rule="evenodd"
                                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        全クリア
                    </button>
                </div>
            </div>
        </div>

        <!-- Processing Indicator -->
        <div class="processing-section" id="processingSection" style="display:none">
            <div class="processing-indicator">
                <div class="spinner"></div>
                <p id="processingText">画像を処理中...</p>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>InstaSquare — Instagram用に最適化された写真をすばやく作成</p>
        </footer>
    </div>

    <!-- Hidden canvas for processing -->
    <canvas id="processingCanvas" style="display:none"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
