<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>InstaSquare - シンプル画像加工</title>
    <meta name="description" content="Instagram投稿向け。1枚ずつ明るさ・ぼかしを調整できるシンプルなWebアプリ。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#grad)" stroke-width="2" />
                        <circle cx="12" cy="12" r="5" stroke="url(#grad)" stroke-width="2" />
                        <circle cx="18" cy="6" r="1.5" fill="url(#grad)" />
                        <defs>
                            <linearGradient id="grad" x1="0" y1="0" x2="24" y2="24">
                                <stop offset="0%" stop-color="#f09433" />
                                <stop offset="50%" stop-color="#dc2743" />
                                <stop offset="100%" stop-color="#bc1888" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>InstaSquare</h1>
            </div>
            <p class="tagline">1枚ずつ明るさ・ぼかしを調整</p>
        </header>

        <div class="aspect-tabs" id="aspectTabs">
            <button class="aspect-tab active" data-aspect="1:1">
                <span class="aspect-tab-main"><span class="aspect-icon"><span class="aspect-box aspect-1-1"></span></span><span>1:1</span></span>
                <span class="aspect-tab-sub">フィード</span>
            </button>
            <button class="aspect-tab" data-aspect="3:4">
                <span class="aspect-tab-main"><span class="aspect-icon"><span class="aspect-box aspect-3-4"></span></span><span>3:4</span></span>
                <span class="aspect-tab-sub">縦長</span>
            </button>
            <button class="aspect-tab" data-aspect="9:16">
                <span class="aspect-tab-main"><span class="aspect-icon"><span class="aspect-box aspect-9-16"></span></span><span>9:16</span></span>
                <span class="aspect-tab-sub">ストーリーズ</span>
            </button>
        </div>

        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M32 8L32 40" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" />
                            <path d="M20 20L32 8L44 20" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M8 44V48C8 52.4183 11.5817 56 16 56H48C52.4183 56 56 52.4183 56 48V44" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" />
                            <defs>
                                <linearGradient id="uploadGrad" x1="8" y1="8" x2="56" y2="56">
                                    <stop offset="0%" stop-color="#f09433" />
                                    <stop offset="50%" stop-color="#dc2743" />
                                    <stop offset="100%" stop-color="#bc1888" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2>タップして写真を選択</h2>
                    <p>最大<strong>20枚</strong>まで</p>
                    <p class="upload-formats">JPG / PNG / WebP</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>
            <div class="upload-count" id="uploadCount" style="display:none">
                <span id="countText">0 / 20 枚</span>
            </div>
        </div>

        <div class="editor-section" id="editorSection" style="display:none">
            <div class="thumb-strip-wrap">
                <div class="thumb-strip" id="thumbStrip"></div>
                <button class="btn btn-secondary btn-sm" id="addMoreBtn">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                        <path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" />
                    </svg>
                    追加
                </button>
            </div>

            <div class="editor-preview-wrap">
                <div class="editor-preview" id="editorPreview">
                    <canvas id="previewCanvas"></canvas>
                </div>
                <div class="preview-meta" id="previewMeta"></div>
            </div>

            <div class="editor-filters">
                <div class="filter-card">
                    <label for="blurRange">
                        <span class="filter-label-text">ぼかし</span>
                        <span class="filter-value" id="blurValue">0</span>
                    </label>
                    <input type="range" id="blurRange" min="0" max="20" step="1" value="0" class="slider">
                </div>
                <div class="filter-card">
                    <label for="brightnessRange">
                        <span class="filter-label-text">明るさ</span>
                        <span class="filter-value" id="brightnessValue">±0</span>
                    </label>
                    <input type="range" id="brightnessRange" min="-100" max="100" step="1" value="0" class="slider">
                </div>
            </div>

            <div class="editor-actions">
                <button class="btn btn-primary" id="downloadBtn">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    この1枚をダウンロード
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                        <path d="M2.5 10a7.5 7.5 0 1 0 7.5-7.5 8.125 8.125 0 0 0-5.62 2.28L2.5 6.67"></path>
                        <path d="M2.5 2.5v4.17h4.17"></path>
                    </svg>
                    この画像をリセット
                </button>
                <button class="btn btn-danger" id="removeOneBtn">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                    この画像を削除
                </button>
                <button class="btn btn-secondary" id="clearAllBtn">全クリア</button>
            </div>
        </div>

        <div class="processing-section" id="processingSection" style="display:none">
            <div class="processing-indicator">
                <div class="spinner"></div>
                <p id="processingText">処理中...</p>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <footer class="footer">
            <p>InstaSquare</p>
        </footer>
    </div>

    <canvas id="processingCanvas" style="display:none"></canvas>
    <script src="app.js"></script>
</body>

</html>
